name: Build APK

# Builds a real, installable, STANDALONE Android APK on every push to
# main - a self-contained local build (expo prebuild + Gradle) rather
# than EAS Build, so it needs no Expo account/token and stays consistent
# with running everything self-hosted.
#
# This builds the *release* variant, not debug. A debug APK does not
# contain the JS bundle - it fetches it live from a Metro dev server on
# your computer at app launch, so installing a debug APK on a phone with
# no dev server running/reachable fails immediately on open. The release
# variant bundles the JS into the APK's assets automatically as part of
# `assembleRelease` (Gradle's react-native plugin runs the JS bundling
# task before packaging), so it opens with no PC/dev-server involved at
# all. The React Native/Expo default template signs release builds with
# the debug keystore automatically when no real release keystore is
# configured, so this still installs fine via sideloading - it's just
# not a Play-Store-ready signature.

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build standalone release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zao-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
