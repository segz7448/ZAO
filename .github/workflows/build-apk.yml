name: Build APK

# Builds a real, installable Android debug APK on every push to main -
# a self-contained local build (expo prebuild + Gradle) rather than
# EAS Build, so it needs no Expo account/token and stays consistent
# with running everything self-hosted. Produces a debug-signed APK
# (fine to sideload for testing, not a Play Store release build).

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zao-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
